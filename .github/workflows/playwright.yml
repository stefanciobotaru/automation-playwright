name: Playwright Tests

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  test:
    timeout-minutes: 30
    runs-on: [self-hosted]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure Playwright system dependencies
        shell: bash
        run: |
          if sudo -n true 2>/dev/null; then
            sudo npx playwright install-deps chromium
            exit 0
          fi

          missing_libs=0
          for lib in libatk-1.0.so.0 libnss3.so libx11.so.6; do
            if ! ldconfig -p | grep -q "$lib"; then
              missing_libs=1
              echo "Missing library: $lib"
            fi
          done

          if [[ "$missing_libs" -eq 1 ]]; then
            echo "::error::Playwright OS dependencies are missing on this self-hosted runner."
            echo "::error::Run once as a privileged user on the runner host: npx playwright install-deps chromium"
            exit 1
          fi

      - name: Install Playwright browsers
        run: npx playwright install chromium

      - name: Run Playwright tests
        run: npm test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 7
